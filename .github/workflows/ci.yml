name: CI

permissions:
  contents: read

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}-${{ runner.os }}
          restore-keys: |
            nuget-${{ runner.os }}

      - name: Cache stubs
        id: cache-stubs
        uses: actions/cache@v4
        with:
          path: .github/_ci
          key: stubs-${{ hashFiles('.github/scripts/gen-stubs.ps1') }}-${{ runner.os }}

      - name: Generate stubs
        if: steps.cache-stubs.outputs.cache-hit != 'true'
        shell: pwsh
        run: pwsh .github/scripts/gen-stubs.ps1

      - name: Build & verify
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $passed = $true
          $refsDir = "${{ github.workspace }}/.github/_ci/refs"

          # Build in background
          $buildJob = Start-Job -ScriptBlock {
            param($refs, $ws)
            Set-Location $ws
            $output = dotnet build Dread.csproj -c Release --nologo -p:GameDir="$refs" -p:BepInExDir="$refs" -p:DeployToProfile=false -p:DeployToDist=false 2>&1
            $exitCode = $LASTEXITCODE
            if ($exitCode -eq 0) { Write-Host "::notice::Build succeeded" }
            else {
              Write-Host "::error::Build failed (exit code $exitCode)"
              $output | ForEach-Object { Write-Host "$_" }
            }
            return @{ output = "$output"; exitCode = $exitCode }
          } -ArgumentList $refsDir, "${{ github.workspace }}"

          # Format check in background (SDK 8 has dotnet-format built in)
          $formatJob = Start-Job -ScriptBlock {
            param($ws)
            Set-Location $ws
            $output = dotnet format Dread.csproj --verify-no-changes 2>&1
            $exitCode = $LASTEXITCODE
            if ($exitCode -ne 0) {
              Write-Host "::warning::Code formatting issues found"
              $output | ForEach-Object { Write-Host "$_" }
            } else {
              Write-Host "::notice::All files are formatted correctly"
            }
            return @{ output = "$output"; exitCode = $exitCode }
          } -ArgumentList "${{ github.workspace }}"

          # Relevance check (inline, fast)
          $title = "${{ github.event.pull_request.title }}"
          $keywords = @('dread','audio','monster','tension','panic','sprint','adrenaline','footstep','breath','crouch','bepinex','harmony','config','stamina','enemy','plugin','fix','feat','refactor','docs','chore','ci','build','version','thunderstore')
          $hasKeyword = ($keywords | Where-Object { "$title".ToLower() -match [regex]::Escape($_) }).Count -gt 0
          if ($title -and -not $hasKeyword) {
            Write-Host "::warning::PR title does not mention any project-relevant keywords"
          }

          # Anti-pattern check
          $issues = 0
          $nullForgiving = Select-String -Path *.cs -Pattern '\w+!' -SimpleMatch
          if ($nullForgiving) {
            Write-Host "::warning::Null-forgiving operator (!) usage found"
            $nullForgiving | ForEach-Object { Write-Host "$_" }
            $issues++
          }
          $hardcoded = Select-String -Path *.cs -Pattern '[A-Z]:\\'
          if ($hardcoded) {
            Write-Host "::warning::Hardcoded Windows paths found"
            $hardcoded | ForEach-Object { Write-Host "$_" }
            $issues++
          }
          if ($issues -eq 0) { Write-Host "::notice::No common issues detected" }

          # Wait for parallel jobs
          $buildResult = Receive-Job -Job $buildJob -Wait -AutoRemoveJob
          $formatResult = Receive-Job -Job $formatJob -Wait -AutoRemoveJob

          if ($buildResult.exitCode -ne 0) { $passed = $false }
          if (-not $passed) { exit 1 }
          Write-Host "::notice::All CI checks passed"
