name: CI

permissions:
  contents: read

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Cache generated stubs
        id: cache-stubs
        uses: actions/cache@v4
        with:
          path: .github/stubs/refs
          key: stubs-${{ hashFiles('.github/scripts/gen-stubs.ps1', '.github/scripts/UnityEngine_stubs.cs') }}

      - name: Generate stubs
        if: steps.cache-stubs.outputs.cache-hit != 'true'
        shell: pwsh
        run: .github/scripts/gen-stubs.ps1

      - name: Build
        shell: bash
        run: |
          set -e
          refsDir=".github/stubs/refs"
          dotnet build Dread.csproj -c Release --nologo \
            -p:GameDir="$refsDir" \
            -p:BepInExDir="$refsDir" \
            -p:DeployToProfile=false \
            -p:DeployToDist=false

      - name: Relevance check
        shell: bash
        run: |
          title="${{ github.event.pull_request.title }}"
          if echo "$title" | grep -qiE 'dread|audio|monster|tension'; then
            :
          elif [ -n "$title" ]; then
            echo "::error::PR title does not mention any project-relevant keywords (dread, audio, monster, tension)"
            exit 1
          fi

      - name: Anti-pattern check
        shell: bash
        run: |
          has_issues=0

          if grep -rnP '(?<!\!)=(\!)(?!\=)' *.cs Systems/*.cs Config/*.cs 2>/dev/null; then
            echo "::error::Null-forgiving operator (!) usage found"
            has_issues=1
          fi

          if grep -rni '[A-Z]:\\' *.cs Systems/*.cs Config/*.cs 2>/dev/null; then
            echo "::error::Hardcoded Windows paths found"
            has_issues=1
          fi

          exit $has_issues

      - name: Format check
        shell: bash
        run: |
          has_issues=0

          if grep -rnI '[[:blank:]]$' *.cs Systems/*.cs Config/*.cs 2>/dev/null; then
            echo "::error::Trailing whitespace found"
            has_issues=1
          fi

          if grep -rnI $'\t' *.cs Systems/*.cs Config/*.cs 2>/dev/null; then
            echo "::error::Tab characters found"
            has_issues=1
          fi

          exit $has_issues
