name: CI

permissions:
  contents: read
  packages: read

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  relevance:
    name: PR Relevance
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      passed: ${{ steps.check.outputs.passed }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR relevance
        id: check
        shell: bash
        run: |
          title="${{ github.event.pull_request.title }}"
          passed="true"

          if echo "$title" | grep -qiE 'fix|feat|refactor|ci|build|docs|dread|audio|monster|tension|panic|psychotic|telemetry|crash'; then
            echo "::notice::PR title matches project keywords"
          else
            files=$(git diff --name-only origin/${{ github.base_ref }}...HEAD 2>/dev/null || echo "")
            if echo "$files" | grep -qiE '\.(cs|ps1|yml|md|csproj)$|^docs/|^\.github/'; then
              echo "::notice::PR touches project files, relevance passed"
            else
              echo "::notice::PR does not appear project-relevant (skipping build/analyze)"
              passed="false"
            fi
          fi

          echo "passed=$passed" >> "$GITHUB_OUTPUT"

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [relevance]
    if: needs.relevance.outputs.passed == 'true'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Cache generated stubs
        id: cache-stubs
        uses: actions/cache@v4
        with:
          path: .github/stubs/refs
          key: stubs-${{ hashFiles('.github/scripts/gen-stubs.ps1', '.github/scripts/UnityEngine_stubs.cs', 'Dread.csproj') }}

      - name: Generate stubs
        if: steps.cache-stubs.outputs.cache-hit != 'true'
        shell: pwsh
        run: .github/scripts/gen-stubs.ps1

      - name: Verify stubs
        shell: bash
        run: |
          dotnet run --project .github/scripts/verify-stubs -- .github/stubs/refs

      - name: Build
        id: build
        shell: bash
        run: |
          set -e
          refsDir=".github/stubs/refs"
          dotnet build Dread.csproj -c Release --nologo \
            -p:GameDir="$refsDir" \
            -p:BepInExDir="$refsDir" \
            -p:DeployToProfile=false \
            -p:DeployToDist=false \
            -fileLoggerParameters:LogFile=${{ runner.temp }}/msbuild.log

      - name: Upload Dread.dll
        uses: actions/upload-artifact@v4
        with:
          name: Dread-CI-DLL
          path: bin/Release/net48/Dread.dll
          retention-days: 7

      - name: Upload MSBuild log on build failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: ${{ runner.temp }}/msbuild.log
          retention-days: 7

  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [relevance]
    if: needs.relevance.outputs.passed == 'true'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Code analysis
        shell: bash
        run: |
          has_issues=0

          if grep -rnP '\w+!\.|\)!\.' *.cs Systems/*.cs Config/*.cs 2>/dev/null | grep -v '!= '; then
            echo "::error::Null-forgiving operator (!) usage found"
            has_issues=1
          fi

          if grep -rni '[A-Z]:\\' *.cs Systems/*.cs Config/*.cs 2>/dev/null; then
            echo "::error::Hardcoded Windows paths found"
            has_issues=1
          fi

          if grep -rnI '[[:blank:]]$' *.cs Systems/*.cs Config/*.cs 2>/dev/null; then
            echo "::error::Trailing whitespace found"
            has_issues=1
          fi

          if grep -rnI $'\t' *.cs Systems/*.cs Config/*.cs 2>/dev/null; then
            echo "::error::Tab characters found"
            has_issues=1
          fi

          if grep -rnP '.{121}' *.cs Systems/*.cs Config/*.cs 2>/dev/null; then
            echo "::error::Lines exceeding 120 characters found"
            has_issues=1
          fi

          if grep -rnl $'\xEF\xBB\xBF' *.cs Systems/*.cs Config/*.cs 2>/dev/null; then
            echo "::error::BOM (byte order mark) found"
            has_issues=1
          fi

          exit $has_issues

      - name: Format check
        shell: bash
        run: dotnet format --verify-no-changes --no-restore

  summary:
    name: Summary
    runs-on: ubuntu-latest
    timeout-minutes: 3
    needs: [relevance, build, analyze]

    if: always()

    steps:
      - name: Print summary table
        shell: bash
        run: |
          echo "### CI Pipeline Results"
          echo ""
          echo "| Job | Status |"
          echo "|-----|--------|"

          exit_code=0

          for job in relevance build analyze; do
            result="${{ needs[job].result }}"
            case "$result" in
              success) status=":green_circle: Passed" ;;
              skipped) status=":yellow_circle: Skipped" ;;
              failure) status=":red_circle: Failed"; exit_code=1 ;;
              *)       status=":white_circle: $result" ;;
            esac
            echo "| $job | $status |"
          done

          echo ""
          echo "**Result:** $([ $exit_code -eq 0 ] && echo 'All checks passed' || echo 'Some checks failed')"

          exit $exit_code
