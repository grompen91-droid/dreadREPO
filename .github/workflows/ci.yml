name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Build & verify
        shell: bash
        run: |
          set -e
          refsDir=".github/stubs/refs"

          # Build (includes NuGet restore, cached if available)
          dotnet build Dread.csproj -c Release --nologo \
            -p:GameDir="$refsDir" \
            -p:BepInExDir="$refsDir" \
            -p:DeployToProfile=false \
            -p:DeployToDist=false &
          build_pid=$!

          # Relevance check (inline, fast, runs during build)
          title="${{ github.event.pull_request.title }}"
          if echo "$title" | grep -qiE 'dread|audio|monster|tension|fix|feat|refactor|docs|chore|ci|build'; then
            :
          elif [ -n "$title" ]; then
            echo "::warning::PR title does not mention any project-relevant keywords"
          fi

          # Anti-pattern check (runs during build)
          grep -rn '\w!' *.cs 2>/dev/null && echo "::warning::Null-forgiving operator (!) usage found" || true
          grep -rn '[A-Z]:\\' *.cs 2>/dev/null && echo "::warning::Hardcoded Windows paths found" || true

          # Format check (grep-based, instant)
          grep -rnI '[[:blank:]]$' *.cs Systems/*.cs Config/*.cs 2>/dev/null && \
            echo "::warning::Trailing whitespace found" || true
          grep -rnI $'\t' *.cs Systems/*.cs Config/*.cs 2>/dev/null && \
            echo "::warning::Tab characters found" || true

          wait $build_pid && echo "::notice::Build succeeded" || { echo "::error::Build failed"; exit 1; }
          echo "::notice::All CI checks passed"
