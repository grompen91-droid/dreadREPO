name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Build & verify
        shell: bash
        run: |
          set -e
          passed=true
          refsDir=".github/stubs/refs"

          # Build in background
          dotnet build Dread.csproj -c Release --nologo \
            -p:GameDir="$refsDir" \
            -p:BepInExDir="$refsDir" \
            -p:DeployToProfile=false \
            -p:DeployToDist=false &
          build_pid=$!

          # Format check in background (SDK 8+ has dotnet-format built in)
          dotnet format Dread.csproj --verify-no-changes 2>&1 || true &
          format_pid=$!

          # Relevance check (inline, fast)
          title="${{ github.event.pull_request.title }}"
          if echo "$title" | grep -qiE 'dread|audio|monster|tension|panic|sprint|adrenaline|footstep|breath|crouch|bepinex|harmony|config|stamina|enemy|plugin|fix|feat|refactor|docs|chore|ci|build|version|thunderstore'; then
            echo "::notice::PR title is project-relevant"
          elif [ -n "$title" ]; then
            echo "::warning::PR title does not mention any project-relevant keywords"
          fi

          # Anti-pattern check
          issues=0
          if grep -rn '\w!' *.cs 2>/dev/null; then
            echo "::warning::Null-forgiving operator (!) usage found"
            issues=$((issues+1))
          fi
          if grep -rn '[A-Z]:\\' *.cs 2>/dev/null; then
            echo "::warning::Hardcoded Windows paths found"
            issues=$((issues+1))
          fi
          if [ "$issues" -eq 0 ]; then
            echo "::notice::No common issues detected"
          fi

          # Wait for build
          wait $build_pid
          build_exit=$?
          if [ $build_exit -ne 0 ]; then
            echo "::error::Build failed"
            passed=false
          else
            echo "::notice::Build succeeded"
          fi

          # Wait for format check
          wait $format_pid
          format_exit=$?
          if [ $format_exit -ne 0 ]; then
            echo "::warning::Code formatting issues found"
          else
            echo "::notice::All files are formatted correctly"
          fi

          $passed || exit 1
          echo "::notice::All CI checks passed"
