# One-shot or on-demand check that security automation is wired up after dependabot.yml / CodeQL changes.
name: Security init (manual)

on:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  actions: read
  security-events: read

jobs:
  status:
    name: Dependabot and security workflows
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: List open Dependabot PRs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "## Open Dependabot PRs"
          gh pr list --author "app/dependabot" --state open --limit 20 \
            --json number,title,url \
            --jq '.[] | "- #\(.number) \(.title) — \(.url)"' || echo "(none)"

      - name: Recent security-related workflow runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "## Recent runs (CodeQL, Dependabot Updates, Dependency Submission)"
          gh run list --limit 15 \
            --json databaseId,name,conclusion,status,event,headBranch,createdAt \
            --jq '.[] | select(.name | test("CodeQL|Dependabot|Dependency Submission")) | "\(.status) \(.conclusion // "—") \(.name) (\(.event)) \(.headBranch) \(.createdAt)"'

  trigger-codeql:
    name: Run CodeQL on master
    runs-on: ubuntu-latest
    needs: status
    permissions:
      contents: read
      actions: write
    steps:
      - name: Dispatch CodeQL workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run "CodeQL" --ref master
